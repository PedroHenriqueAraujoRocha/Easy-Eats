@if (produto) {
  <div class="modal-overlay" (click)="fecharModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      
      <button class="btn-fechar" (click)="fecharModal()">
        <i class="bi bi-x-lg"></i>
      </button>

      <div class="modal-header">
        <div class="icone-confirmacao">
          <i class="bi bi-question-circle" style="font-size: 48px; color: #ff6b00;"></i>
        </div>
        <h3>Confirmar Cadastro</h3>
        <span class="subtitulo">Verifique os dados antes de salvar.</span>
      </div>

      <div class="modal-body resumo-box">
        <div class="emoji-medio">{{ produto.emoji }}</div>
        <h4>{{ produto.nome }}</h4>
        <span class="preco-destaque">R$ {{ produto.preco.toFixed(2) }}</span>
        
        <p class="descricao mt-2">
          Categoria: <strong>{{ produto.categoria || 'Não informada' }}</strong>
        </p>
      </div>

      <div class="modal-footer botoes-lado-a-lado">
        <button class="btn-cancelar" (click)="fecharModal()">
          Cancelar
        </button>
        <button class="btn-salvar" (click)="confirmarCadastro()">
          Salvar Produto
        </button>
      </div>

    </div>
  </div>
}
